services:
  - type: web
    name: idea-ad-api
    runtime: python
    region: frankfurt  # Close to UK
    plan: free
    buildCommand: |
      apt-get update && apt-get install -y ffmpeg
      pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: META_APP_ID
        sync: false
      - key: META_APP_SECRET
        sync: false
      - key: META_SYSTEM_TOKEN
        sync: false
      - key: META_AD_ACCOUNT_ID_SANDBOX
        sync: false
      - key: META_AD_ACCOUNT_ID_LIVE
        sync: false
      - key: META_PAGE_ID
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SANDBOX_MODE
        value: "true"
    healthCheckPath: /health
    autoDeploy: true
